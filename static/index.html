<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLD ORDER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#03040a;--glow:#00d4ff;--glow2:#7b2ff7;--red:#ff2d55;--green:#00ff88;--yellow:#ffd600;--orange:#ff8c00;--text:#e0e6ff;--dim:#4a5070;--glass:rgba(8,10,25,.78)}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:var(--text);font-family:'Rajdhani',sans-serif;cursor:default}

/* CANVAS */
#globe-canvas{position:fixed;inset:0;z-index:0}
#war-canvas{position:fixed;inset:0;z-index:50;pointer-events:none;display:none}
#war-canvas.active{display:block;pointer-events:auto}

/* INTRO */
#intro{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s ease}
#intro.hide{opacity:0;pointer-events:none}
#intro .intro-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:4.5vw;background:linear-gradient(135deg,var(--glow),var(--glow2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:8px;opacity:0;animation:introFade 2s ease .5s forwards}
#intro .intro-sub{font-family:'JetBrains Mono',monospace;font-size:.9rem;color:var(--dim);letter-spacing:4px;margin-top:12px;opacity:0;animation:introFade 1.5s ease 1.5s forwards}
#intro .intro-hint{font-size:.85rem;color:rgba(0,212,255,.4);margin-top:40px;opacity:0;animation:introFade 1s ease 2.5s forwards;cursor:pointer}
#intro .intro-hint:hover{color:var(--glow)}
@keyframes introFade{to{opacity:1}}
.intro-line{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--glow),transparent);margin-top:20px;opacity:0;animation:introFade 1.5s ease 2s forwards}

/* CINEMATIC */
#cinematic{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.88);backdrop-filter:blur(10px)}
#cinematic.active{display:flex}
.cine-year{font-family:'Orbitron',sans-serif;font-size:9vw;font-weight:900;background:linear-gradient(135deg,var(--glow),var(--glow2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:cineIn 1.5s ease forwards;text-shadow:0 0 80px rgba(0,212,255,.3)}
@keyframes cineIn{0%{opacity:0;transform:scale(.4) translateY(40px);filter:blur(30px)}60%{opacity:1;transform:scale(1.08);filter:blur(0)}100%{opacity:1;transform:scale(1)}}
.cine-sub{font-family:'JetBrains Mono',monospace;font-size:1.1rem;color:var(--dim);letter-spacing:5px;margin-top:16px;opacity:0;animation:cineIn 1s ease .6s forwards}

/* LEADER CAROUSEL */
#leader-carousel{position:fixed;bottom:0;left:0;right:0;z-index:85;display:none;padding:16px 24px;overflow-x:auto;gap:14px;scroll-snap-type:x mandatory;scrollbar-width:none}
#leader-carousel::-webkit-scrollbar{display:none}
#leader-carousel.active{display:flex}
.ldr-card{min-width:340px;max-width:380px;scroll-snap-align:start;background:var(--glass);backdrop-filter:blur(20px);border:1px solid rgba(0,212,255,.12);border-radius:16px;padding:1.2rem 1.4rem;flex-shrink:0;opacity:0;transform:translateY(80px) scale(.95);transition:all .6s cubic-bezier(.4,0,.2,1)}
.ldr-card.show{opacity:1;transform:translateY(0) scale(1)}
.ldr-card .lc-flag{width:32px;height:20px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:8px;background:linear-gradient(135deg,var(--glow),var(--glow2));opacity:.3}
.ldr-card .lc-country{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:3px;color:var(--glow);text-transform:uppercase}
.ldr-card .lc-name{font-size:1.4rem;font-weight:700;margin:6px 0 4px}
.ldr-card .lc-mood{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:1px}
.ldr-card .lc-statement{color:rgba(224,230,255,.5);font-style:italic;font-size:.82rem;margin:10px 0;line-height:1.5;border-left:2px solid rgba(0,212,255,.15);padding-left:10px}
.ldr-card .lc-action{display:flex;align-items:center;gap:8px;font-size:.8rem;padding:4px 0}
.lc-action-type{font-family:'JetBrains Mono',monospace;font-size:.6rem;padding:2px 8px;border-radius:4px;background:rgba(0,212,255,.1);color:var(--glow);letter-spacing:1px}
.lc-action-target{color:var(--yellow);font-weight:700}
.lc-bar{width:50px;height:3px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden;flex-shrink:0}
.lc-bar-fill{height:100%;border-radius:2px}

/* HUD */
#hud{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;transition:opacity .8s ease}
#hud.visible{opacity:1}
#hud>*{pointer-events:auto}

/* HUD: Top Left */
.hud-tl{position:absolute;top:20px;left:28px}
.hud-tl .logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.5rem;background:linear-gradient(135deg,var(--glow),var(--glow2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px}
.hud-tl .logo-sub{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--dim);letter-spacing:2px;margin-top:2px}

/* HUD: Top Right */
.hud-tr{position:absolute;top:20px;right:28px;text-align:right}
#hud-year{font-family:'Orbitron',sans-serif;font-size:3.2rem;font-weight:900;color:var(--glow);line-height:1;text-shadow:0 0 40px rgba(0,212,255,.5);transition:all .4s ease}
#hud-year.pop{animation:yearPop .5s ease}
@keyframes yearPop{0%{transform:scale(1)}40%{transform:scale(1.15);text-shadow:0 0 60px rgba(0,212,255,.8)}100%{transform:scale(1)}}
#hud-turn{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--dim);letter-spacing:3px;margin-top:4px}
.mini-stats{display:flex;gap:20px;margin-top:10px;justify-content:flex-end}
.ms{text-align:center}
.ms-v{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700}
.ms-l{font-size:.5rem;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* HUD: Bottom Center */
.hud-bc{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center}
.hbtn{background:var(--glass);backdrop-filter:blur(16px);border:1px solid rgba(0,212,255,.15);color:var(--text);padding:14px 32px;border-radius:14px;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:2px;text-transform:uppercase;position:relative;overflow:hidden}
.hbtn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--glow),transparent);opacity:0;transition:opacity .3s}
.hbtn:hover::after{opacity:1}
.hbtn:hover{border-color:var(--glow);box-shadow:0 0 35px rgba(0,212,255,.15);transform:translateY(-2px)}
.hbtn:active{transform:translateY(0)}
.hbtn.primary{border-color:rgba(0,212,255,.3);box-shadow:0 0 20px rgba(0,212,255,.1)}
.hbtn.danger{border-color:rgba(255,45,85,.25)}
.hbtn.danger:hover{border-color:var(--red);box-shadow:0 0 35px rgba(255,45,85,.2)}
.hbtn:disabled{opacity:.25;cursor:not-allowed;transform:none!important}

/* HUD: Bottom Left - Ticker */
.hud-bl{position:absolute;bottom:28px;left:28px;max-width:400px;display:flex;flex-direction:column;gap:6px}
.tick{background:var(--glass);backdrop-filter:blur(16px);border-left:3px solid var(--glow);border-radius:0 10px 10px 0;padding:10px 16px;font-size:.78rem;animation:tickIn .5s cubic-bezier(.4,0,.2,1);overflow:hidden}
.tick.critical{border-left-color:var(--red);background:rgba(255,45,85,.06)}
.tick.high{border-left-color:var(--orange)}
.tick .tick-t{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tick .tick-s{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--dim);letter-spacing:1px;margin-bottom:2px}
@keyframes tickIn{from{opacity:0;transform:translateX(-40px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}

/* HUD: Bottom Right - Wars */
.hud-br{position:absolute;bottom:28px;right:28px;max-width:320px;display:flex;flex-direction:column;gap:6px}
.wbadge{background:rgba(255,45,85,.06);backdrop-filter:blur(16px);border:1px solid rgba(255,45,85,.2);border-radius:10px;padding:10px 16px;font-size:.82rem;animation:wPulse 2.5s ease infinite}
@keyframes wPulse{0%,100%{box-shadow:0 0 8px rgba(255,45,85,.08)}50%{box-shadow:0 0 30px rgba(255,45,85,.2)}}
.wbadge .wb-vs{color:var(--red);font-weight:700;font-size:.9rem}
.wbadge .wb-info{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--dim);margin-top:2px}

/* TOOLTIP */
#tooltip{position:fixed;z-index:45;pointer-events:none;background:var(--glass);backdrop-filter:blur(20px);border:1px solid rgba(0,212,255,.15);border-radius:12px;padding:14px 18px;min-width:220px;opacity:0;transition:opacity .2s;transform:translate(-50%,-120%)}
#tooltip.visible{opacity:1}
#tooltip .tt-name{font-size:1.1rem;font-weight:700;margin-bottom:2px}
#tooltip .tt-leader{color:var(--dim);font-size:.8rem}
#tooltip .tt-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;margin-top:8px;font-size:.78rem}
#tooltip .tt-label{color:var(--dim)}
#tooltip .tt-val{font-family:'JetBrains Mono',monospace;font-weight:700;text-align:right}
#tooltip .tt-bar{grid-column:1/-1;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin:2px 0}
#tooltip .tt-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}

/* INFO PANEL */
#info-panel{position:fixed;top:0;right:-440px;width:440px;height:100%;z-index:60;background:rgba(5,6,15,.92);backdrop-filter:blur(24px);border-left:1px solid rgba(0,212,255,.08);transition:right .5s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:28px;scrollbar-width:thin}
#info-panel.open{right:0}
.ip-close{position:absolute;top:18px;right:18px;background:none;border:none;color:var(--dim);font-size:1.8rem;cursor:pointer;transition:color .2s}.ip-close:hover{color:var(--text)}
.ip-tag{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:3px;color:var(--glow);text-transform:uppercase;margin-bottom:16px}
.ip-name{font-size:2.2rem;font-weight:900;line-height:1.1}
.ip-leader{color:var(--dim);font-size:.9rem;margin:4px 0 20px}
.ip-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.ip-rl{color:var(--dim);font-size:.82rem}
.ip-rv{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.9rem}
.ip-bar{width:100%;height:5px;background:rgba(255,255,255,.04);border-radius:3px;margin-top:4px;overflow:hidden}
.ip-bar-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.ip-btns{margin-top:24px;display:flex;flex-direction:column;gap:10px}

/* WAR OVERLAY */
#war-overlay{position:fixed;inset:0;z-index:70;display:none;background:rgba(0,0,0,.85);backdrop-filter:blur(8px)}
#war-overlay.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.wo-close{position:absolute;top:24px;right:28px;background:none;border:none;color:var(--dim);font-size:2rem;cursor:pointer}
.wo-title{text-align:center;margin-bottom:2.5rem}
.wo-vs{font-family:'Orbitron',sans-serif;font-size:2rem;color:var(--red);text-shadow:0 0 50px rgba(255,45,85,.3);margin:0 20px}
.wo-n{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:700}
.wo-n.att{color:var(--glow)}.wo-n.def{color:var(--red)}
.wo-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:3rem;align-items:center;max-width:900px;width:90%}
.wo-side{text-align:center}
.wo-pwr{font-family:'Orbitron',sans-serif;font-size:3rem;font-weight:900}
.wo-lbl{font-size:.65rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.wo-mid{text-align:center}
.wo-ratio{font-family:'Orbitron',sans-serif;font-size:1.8rem;color:var(--yellow)}
.wo-outcomes{max-width:700px;width:90%;margin-top:2.5rem}
.wo-orow{display:flex;align-items:center;gap:14px;margin:10px 0}
.wo-olbl{width:160px;text-align:right;font-size:.85rem;color:var(--dim)}
.wo-obar{flex:1;height:28px;background:rgba(255,255,255,.03);border-radius:8px;overflow:hidden;position:relative}
.wo-ofill{height:100%;border-radius:8px;transition:width 1.8s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:.8rem;font-weight:700;min-width:0}
.wo-acts{margin-top:2.5rem;display:flex;gap:14px}

/* INTEL */
#intel-overlay{position:fixed;inset:0;z-index:70;display:none;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);overflow-y:auto;padding:80px 48px 48px}
#intel-overlay.active{display:block}
.intel-close{position:fixed;top:24px;right:28px;background:none;border:none;color:var(--dim);font-size:2rem;cursor:pointer;z-index:75}
.isec{margin-bottom:2.5rem}
.isec-t{font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:4px;color:var(--glow);text-transform:uppercase;margin-bottom:1.2rem;padding-bottom:10px;border-bottom:1px solid rgba(0,212,255,.08)}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.icard{background:rgba(8,10,25,.85);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:1.1rem;transition:all .3s}
.icard:hover{border-color:rgba(0,212,255,.15);box-shadow:0 0 25px rgba(0,212,255,.04);transform:translateY(-2px)}
.icard .ic-n{font-weight:700;font-size:1.05rem;margin-bottom:4px}
.icard .ic-m{color:var(--dim);font-size:.75rem}
.icard .ic-s{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--yellow);margin-top:6px}
.icard.pmc{border-left:3px solid var(--red)}.icard.fin{border-left:3px solid var(--yellow)}.icard.nrg{border-left:3px solid var(--green)}.icard.pred{border-left:3px solid var(--glow2)}.icard.pred.hr{border-left-color:var(--red)}

/* CRISIS MODAL */
#crisis-modal{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(8px)}
#crisis-modal.active{display:flex}
.cm{background:rgba(8,10,25,.95);border:1px solid rgba(255,45,85,.15);border-radius:20px;padding:2.5rem;width:90%;max-width:520px}
.cm h2{font-family:'Orbitron',sans-serif;font-size:.75rem;letter-spacing:4px;color:var(--red);margin-bottom:1.8rem}
.cm-i{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:var(--text);padding:14px;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:1rem;margin-bottom:14px;transition:border-color .2s}
.cm-i:focus{outline:none;border-color:rgba(0,212,255,.3)}

/* EFFECTS */
.war-flash{position:fixed;inset:0;z-index:200;pointer-events:none;background:var(--red);animation:wfl .7s ease forwards}
@keyframes wfl{0%{opacity:0}6%{opacity:.25}12%{opacity:0}20%{opacity:.15}100%{opacity:0}}
@keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-5px,3px)}20%{transform:translate(4px,-4px)}30%{transform:translate(-3px,5px)}40%{transform:translate(5px,-2px)}50%{transform:translate(-4px,4px)}}
.shaking{animation:shake .5s ease}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,212,255,.15);border-radius:2px}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-logo">WORLD ORDER</div>
  <div class="intro-line"></div>
  <div class="intro-sub">AI-POWERED GEOPOLITICAL SIMULATION</div>
  <div class="intro-hint" onclick="G.dismissIntro()">[ CLICK TO BEGIN ]</div>
</div>

<canvas id="globe-canvas"></canvas>
<canvas id="war-canvas"></canvas>
<div id="cinematic"></div>
<div id="leader-carousel"></div>
<div id="tooltip"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-tl"><div class="logo">WORLD ORDER</div><div class="logo-sub">AI GEOPOLITICAL SIMULATION</div></div>
  <div class="hud-tr">
    <div id="hud-year">2025</div>
    <div id="hud-turn">TURN 0</div>
    <div class="mini-stats" id="mini-stats"></div>
  </div>
  <div class="hud-bc">
    <button class="hbtn primary" id="btn-turn" onclick="G.nextTurn()">NEXT TURN</button>
    <button class="hbtn" onclick="G.autoRun(5)">AUTO 5</button>
    <button class="hbtn danger" onclick="G.showCrisis()">CRISIS</button>
    <button class="hbtn" onclick="G.showIntel()">INTEL</button>
    <button class="hbtn" onclick="G.resetSim()">RESET</button>
  </div>
  <div class="hud-bl" id="hud-ticker"></div>
  <div class="hud-br" id="hud-wars"></div>
</div>

<div id="info-panel"><button class="ip-close" onclick="G.closeInfo()">&times;</button><div id="info-content"></div></div>
<div id="war-overlay"><button class="wo-close" onclick="G.closeWar()">&times;</button><div id="war-content"></div></div>
<div id="intel-overlay"><button class="intel-close" onclick="G.closeIntel()">&times;</button><div id="intel-content"></div></div>
<div id="crisis-modal"><div class="cm"><h2>INJECT CRISIS</h2><input class="cm-i" id="cm-title" value="Global Oil Supply Shock"><textarea class="cm-i" id="cm-desc" rows="3">Major disruption to global oil supply.</textarea><input class="cm-i" id="cm-targets" placeholder="Target countries: US, CN, RU"><div style="display:flex;gap:10px;margin-top:8px"><button class="hbtn danger" style="flex:1" onclick="G.injectCrisis()">INJECT</button><button class="hbtn" onclick="G.closeCrisis()">CANCEL</button></div></div></div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import*as THREE from'three';

/* ════════════ GEO DATA ════════════ */
const GEO={US:[38,-97],CN:[35,105],RU:[60,100],IN:[20,77],BR:[-14,-51],GB:[54,-2],FR:[46,2],DE:[51,10],JP:[36,138],KR:[36,128],CA:[56,-106],AU:[-25,134],IT:[42,12],ES:[40,-4],MX:[23,-102],ID:[-5,120],TR:[39,35],SA:[24,45],IR:[32,53],EG:[27,30],ZA:[-29,24],NG:[10,8],PK:[30,70],BD:[24,90],VN:[16,108],TH:[15,101],PL:[52,20],UA:[49,32],SE:[62,15],NO:[62,10],NL:[52,5],CH:[47,8],IL:[31,35],AE:[24,54],QA:[25,51],KP:[40,127],TW:[24,121],PH:[13,122],MY:[4,102],SG:[1,104],NZ:[-41,174],AR:[-34,-64],CO:[4,-72],CL:[-30,-71],PE:[-10,-76],ET:[9,38],KE:[-1,38],IQ:[33,44],AF:[34,69],MM:[20,97],VE:[7,-66],CU:[22,-80],BY:[54,28],RW:[-2,30],SY:[35,38]};

/* ════════════ STATE ════════════ */
const S={countries:[],decisions:{},events:[],sel:[],year:2025,turn:0,running:false,ws:null,hoveredCode:null};

/* ════════════ THREE.JS SETUP ════════════ */
const canvas=document.getElementById('globe-canvas');
const R=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));
R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.2;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020308);
const cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,2000);
cam.position.set(0,.3,3.5);

// ── Stars (2 layers for depth) ──
function makeStars(count,spread,size,opacity){
  const g=new THREE.BufferGeometry();const v=new Float32Array(count*3);
  for(let i=0;i<count*3;i++)v[i]=(Math.random()-.5)*spread;
  g.setAttribute('position',new THREE.BufferAttribute(v,3));
  return new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size,transparent:true,opacity,sizeAttenuation:true}));
}
scene.add(makeStars(3000,200,.12,.6));
scene.add(makeStars(1500,150,.25,.3));

// ── Earth ──
const texLoader=new THREE.TextureLoader();
const earthTex=texLoader.load('https://unpkg.com/three-globe@2.31.1/example/img/earth-blue-marble.jpg');
const bumpTex=texLoader.load('https://unpkg.com/three-globe@2.31.1/example/img/earth-topology.png');
const specTex=texLoader.load('https://unpkg.com/three-globe@2.31.1/example/img/earth-water.png');
earthTex.colorSpace=THREE.SRGBColorSpace;

const earthGeo=new THREE.SphereGeometry(1,80,80);
const earthMat=new THREE.MeshPhongMaterial({map:earthTex,bumpMap:bumpTex,bumpScale:.03,specularMap:specTex,specular:new THREE.Color(0x222244),shininess:8});
const earth=new THREE.Mesh(earthGeo,earthMat);
scene.add(earth);

// ── Atmosphere ──
const atmosGeo=new THREE.SphereGeometry(1.015,64,64);
const atmosMat=new THREE.ShaderMaterial({

  fragmentShader:`varying vec3 vN;void main(){float i=pow(.7-dot(vN,vec3(0,0,1.)),3.);gl_FragColor=vec4(.15,.6,1.,1.)*i*.8;}`,
  blending:THREE.AdditiveBlending,side:THREE.BackSide,transparent:true,depthWrite:false
});

// ── Markers + Labels ──
const markersG=new THREE.Group();scene.add(markersG);
const arcsG=new THREE.Group();scene.add(arcsG);
const labelsDiv=document.createElement('div');labelsDiv.style.cssText='position:fixed;inset:0;z-index:5;pointer-events:none;overflow:hidden';document.body.appendChild(labelsDiv);

function ll2v(lat,lon,r=1.025){const p=(90-lat)*Math.PI/180,t=(lon+180)*Math.PI/180;return new THREE.Vector3(-r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));}

function updateMarkers(){
  markersG.clear();arcsG.clear();labelsDiv.innerHTML='';
  S.countries.forEach(c=>{
    const g=GEO[c.code];if(!g)return;
    const isWar=Object.values(c.relations||{}).includes('war');
    const unstable=c.stability<.3;
    const col=isWar?0xff2d55:unstable?0xffd600:c.nuclear?0x7b2ff7:c.power>50?0x00d4ff:c.power>25?0x2288aa:0x334466;
    const sz=Math.max(.012,Math.min(.045,c.power/1400));
    const pos=ll2v(g[0],g[1]);

    // Marker sphere
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(sz,10,10),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.9}));
    mesh.position.copy(pos);mesh.userData={code:c.code};markersG.add(mesh);

    // Glow ring
    const ring=new THREE.Mesh(new THREE.RingGeometry(sz*1.5,sz*2.2,20),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.15,side:THREE.DoubleSide,depthWrite:false}));
    ring.position.copy(pos);ring.lookAt(0,0,0);markersG.add(ring);

    // Selection ring
    if(S.sel.includes(c.code)){
      const sr=new THREE.Mesh(new THREE.RingGeometry(sz*3,sz*3.8,24),new THREE.MeshBasicMaterial({color:0xffd600,transparent:true,opacity:.5,side:THREE.DoubleSide,depthWrite:false}));
      sr.position.copy(pos);sr.lookAt(0,0,0);markersG.add(sr);
    }

    // Pillar (vertical beam for top 10)
    if(c.power>40){
      const pillarH=c.power/600;
      const pillarG=new THREE.CylinderGeometry(.002,.002,pillarH,4);
      const pillarM=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.2});
      const pillar=new THREE.Mesh(pillarG,pillarM);
      const dir=pos.clone().normalize();
      pillar.position.copy(pos.clone().add(dir.clone().multiplyScalar(pillarH/2)));
      pillar.lookAt(pos.clone().add(dir));pillar.rotateX(Math.PI/2);
      markersG.add(pillar);
    }

    // War arcs
    Object.entries(c.relations||{}).forEach(([t,rel])=>{
      if(rel==='war'&&GEO[t]){
        const from=ll2v(g[0],g[1],1.03),to=ll2v(GEO[t][0],GEO[t][1],1.03);
        const mid=from.clone().add(to).multiplyScalar(.5).normalize().multiplyScalar(1.5);
        const curve=new THREE.QuadraticBezierCurve3(from,mid,to);
        const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(50)),new THREE.LineBasicMaterial({color:0xff2d55,transparent:true,opacity:.5}));
        arcsG.add(line);
      }
    });
  });
}

function updateLabels(){
  labelsDiv.innerHTML='';
  const top=S.countries.filter(c=>GEO[c.code]&&c.power>15).slice(0,30);
  top.forEach(c=>{
    const g=GEO[c.code];
    const pos=ll2v(g[0],g[1],1.06);
    const v=pos.clone();
    v.applyMatrix4(earth.matrixWorld);
    v.project(cam);
    if(v.z>1)return; // behind camera
    const x=(v.x*.5+.5)*innerWidth;
    const y=(-(v.y*.5)+.5)*innerHeight;
    const isWar=Object.values(c.relations||{}).includes('war');
    const col=isWar?'var(--red)':c.power>50?'var(--glow)':'var(--dim)';
    const lbl=document.createElement('div');
    lbl.style.cssText=`position:absolute;left:${x}px;top:${y}px;transform:translate(-50%,-180%);font-family:'JetBrains Mono',monospace;font-size:${c.power>40?'.65rem':'.5rem'};color:${col};letter-spacing:1px;text-shadow:0 0 8px rgba(0,0,0,.8);white-space:nowrap;opacity:${c.power>40?.8:.4}`;
    lbl.textContent=c.code;
    labelsDiv.appendChild(lbl);
  });
}

// ── Raycaster ──
const ray=new THREE.Raycaster();const mouse=new THREE.Vector2();
let dragging=false,dragS={x:0,y:0},rotY=0,rotX=.2,tRotY=0,tRotX=.2,autoRot=true;

canvas.addEventListener('pointerdown',e=>{dragging=false;dragS={x:e.clientX,y:e.clientY}});
canvas.addEventListener('pointermove',e=>{
  // Hover
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,cam);
  const hits=ray.intersectObjects(markersG.children);
  const tt=document.getElementById('tooltip');
  if(hits.length&&hits[0].object.userData.code){
    const code=hits[0].object.userData.code;
    const c=S.countries.find(x=>x.code===code);
    if(c){
      S.hoveredCode=code;
      const stabPct=Math.round(c.stability*100);
      const stabCol=stabPct>60?'var(--green)':stabPct>35?'var(--yellow)':'var(--red)';
      tt.innerHTML=`<div class="tt-name">${c.name} ${c.nuclear?'<span style="color:var(--glow2)">☢</span>':''}</div><div class="tt-leader">${c.leader}</div><div class="tt-stats"><span class="tt-label">Power</span><span class="tt-val" style="color:var(--glow)">${c.power}</span><span class="tt-label">GDP</span><span class="tt-val">$${c.gdp}T</span><span class="tt-label">Military</span><span class="tt-val">${Math.round(c.military*100)}%</span><span class="tt-label">Stability</span><span class="tt-val" style="color:${stabCol}">${stabPct}%</span></div><div class="tt-bar"><div class="tt-bar-fill" style="width:${stabPct}%;background:${stabCol}"></div></div>`;
      tt.style.left=e.clientX+'px';tt.style.top=e.clientY+'px';tt.classList.add('visible');
      canvas.style.cursor='pointer';
    }
  }else{S.hoveredCode=null;tt.classList.remove('visible');canvas.style.cursor='grab';}
  // Drag
  if(e.buttons){
    const dx=e.clientX-dragS.x,dy=e.clientY-dragS.y;
    if(Math.abs(dx)+Math.abs(dy)>5)dragging=true;
    tRotY+=dx*.004;tRotX=Math.max(-.8,Math.min(.8,tRotX+dy*.004));
    dragS={x:e.clientX,y:e.clientY};autoRot=false;
    clearTimeout(window._art);window._art=setTimeout(()=>autoRot=true,6000);
    canvas.style.cursor='grabbing';
  }
});
canvas.addEventListener('pointerup',e=>{
  if(!dragging){
    const code=S.hoveredCode;
    if(code)G.selectCountry(code);
  }
  canvas.style.cursor=S.hoveredCode?'pointer':'grab';
});
canvas.addEventListener('wheel',e=>{cam.position.z=Math.max(1.6,Math.min(6,cam.position.z+e.deltaY*.002))});

// ── Animate ──
let t=0;
function animate(){
  requestAnimationFrame(animate);t+=.004;
  if(autoRot)tRotY+=.0008;
  rotY+=(tRotY-rotY)*.04;rotX+=(tRotX-rotX)*.04;
  earth.rotation.y=rotY;earth.rotation.x=rotX;
  markersG.rotation.y=rotY;markersG.rotation.x=rotX;
  arcsG.rotation.y=rotY;arcsG.rotation.x=rotX;
  // Pulse rings
  markersG.children.forEach((m,i)=>{if(m.geometry?.type==='RingGeometry')m.material.opacity=.1+Math.sin(t*3+i*.5)*.08;});
  // Pulse arcs
  arcsG.children.forEach((a,i)=>{if(a.material)a.material.opacity=.25+Math.sin(t*5+i)*.25;});
  R.render(scene,cam);
  updateLabels();
}
animate();
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});

/* ════════════ PARTICLES ════════════ */
const wc=document.getElementById('war-canvas'),wx=wc.getContext('2d');
wc.width=innerWidth;wc.height=innerHeight;
let particles=[];
class P{constructor(x,y,c,vx,vy,l=50){this.x=x;this.y=y;this.c=c;this.vx=vx;this.vy=vy;this.l=l;this.ml=l;this.s=Math.random()*3+1}
update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.04;this.vx*=.97;this.l--}
draw(ctx){const a=this.l/this.ml;ctx.globalAlpha=a;ctx.fillStyle=this.c;ctx.beginPath();ctx.arc(this.x,this.y,this.s*a,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
get dead(){return this.l<=0}}
function boom(x,y,n=40,c='#ff2d55'){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*5+1;particles.push(new P(x,y,c,Math.cos(a)*s,Math.sin(a)*s,35+Math.random()*25))}}
function animP(){if(!particles.length)return;wx.clearRect(0,0,wc.width,wc.height);particles.forEach(p=>{p.update();p.draw(wx)});particles=particles.filter(p=>!p.dead);if(particles.length)requestAnimationFrame(animP)}

/* ════════════ GAME CONTROLLER ════════════ */
const G={
  async init(){
    this.connectWS();await this.load();updateMarkers();this.updateHUD();
  },
  connectWS(){
    const pr=location.protocol==='https:'?'wss':'ws';
    S.ws=new WebSocket(`${pr}://${location.host}/ws`);
    S.ws.onmessage=e=>{const m=JSON.parse(e.data);
      if(m.type==='war_started'){this.flash();this.tick(`WAR: ${m.attacker} vs ${m.defender}`,'critical')}
      if(m.type==='crisis'){this.shake();this.tick(`CRISIS: ${m.title}`,'critical')}
      if(m.type==='leader_change'){this.tick(`LEADER CHANGE: ${m.country} (${m.reason})`,'high')}
    };S.ws.onclose=()=>setTimeout(()=>this.connectWS(),3000);
  },
  async load(){S.countries=await(await fetch('/api/countries')).json()},
  dismissIntro(){const el=document.getElementById('intro');el.classList.add('hide');setTimeout(()=>el.style.display='none',1000);document.getElementById('hud').classList.add('visible')},
  updateHUD(){
    document.getElementById('hud-year').textContent=S.year;
    document.getElementById('hud-turn').textContent=`TURN ${S.turn}`;
    const nuc=S.countries.filter(c=>c.nuclear).length;
    const wars=S.countries.filter(c=>Object.values(c.relations||{}).includes('war')).length;
    const gdp=S.countries.reduce((s,c)=>s+c.gdp,0);
    document.getElementById('mini-stats').innerHTML=`<div class="ms"><div class="ms-v">${S.countries.length}</div><div class="ms-l">Nations</div></div><div class="ms"><div class="ms-v" style="color:var(--glow2)">${nuc}</div><div class="ms-l">Nuclear</div></div><div class="ms"><div class="ms-v" style="color:${wars?'var(--red)':'var(--green)'}">${wars}</div><div class="ms-l">Wars</div></div><div class="ms"><div class="ms-v">$${gdp.toFixed(0)}T</div><div class="ms-l">GDP</div></div>`;
    this.updateWars();
  },
  async updateWars(){try{const w=await(await fetch('/api/active-wars')).json();const el=document.getElementById('hud-wars');const a=Object.entries(w).filter(([_,r])=>!r.outcome);el.innerHTML=a.map(([_,r])=>`<div class="wbadge"><div class="wb-vs">${r.attacker} vs ${r.defender}</div><div class="wb-info">${r.phase} | Turn ${r.turns_elapsed} | Casualties: ${(r.attacker_casualties+r.defender_casualties).toLocaleString()}</div></div>`).join('')}catch(e){}},
  tick(text,sev='medium'){const el=document.getElementById('hud-ticker');const d=document.createElement('div');d.className=`tick ${sev}`;d.innerHTML=`<div class="tick-s">${sev.toUpperCase()}</div><div class="tick-t">${text}</div>`;el.prepend(d);while(el.children.length>5)el.lastChild.remove();setTimeout(()=>{if(d.parentNode)d.remove()},8000)},

  /* ── TURN ── */
  async nextTurn(){
    if(S.running)return;S.running=true;
    document.getElementById('btn-turn').disabled=true;
    await this.cine('PROCESSING...','Simulating world events');
    try{
      const r=await(await fetch('/api/simulation/next-turn',{method:'POST'})).json();
      S.decisions=r.decisions||{};S.events=S.events.concat(r.events||[]);S.year=r.year;S.turn=r.turn;
      await this.load();updateMarkers();this.updateHUD();
      await this.cine(S.year,`${Object.keys(S.decisions).length} leaders decided`);
      const yd=document.getElementById('hud-year');yd.textContent=S.year;yd.classList.remove('pop');void yd.offsetWidth;yd.classList.add('pop');
      await this.showCards(S.decisions);
      (r.events||[]).slice(-3).forEach(e=>this.tick(e.title,e.severity));
    }catch(e){this.tick(`Error: ${e.message}`,'critical')}
    document.getElementById('btn-turn').disabled=false;S.running=false;
  },
  async autoRun(n){for(let i=0;i<n;i++){await this.nextTurn();await new Promise(r=>setTimeout(r,400))}},
  cine(main,sub=''){return new Promise(res=>{const el=document.getElementById('cinematic');el.innerHTML=`<div style="text-align:center"><div class="cine-year">${main}</div>${sub?`<div class="cine-sub">${sub}</div>`:''}</div>`;el.classList.add('active');setTimeout(()=>{el.classList.remove('active');res()},2200)})},
  showCards(dec){return new Promise(res=>{const entries=Object.entries(dec);if(!entries.length){res();return}const el=document.getElementById('leader-carousel');el.innerHTML='';el.classList.add('active');
    entries.forEach(([code,d],i)=>{const c=S.countries.find(x=>x.code===code);const nm=c?c.name:code;const ld=c?c.leader:'?';const mood=d.mood||'?';const mc={confident:'#00ff88',aggressive:'#ff2d55',anxious:'#ff8c00',defensive:'#ffd600',opportunistic:'#00d4ff',desperate:'#ff2d55'}[mood]||'#4a5070';const stmt=d.public_statement||d.inner_thoughts||'...';const acts=d.actions||[];
      const card=document.createElement('div');card.className='ldr-card';
      card.innerHTML=`<div class="lc-country">${nm} (${code})</div><div class="lc-name">${ld}</div><span class="lc-mood" style="background:${mc}15;color:${mc};border:1px solid ${mc}33">${mood.toUpperCase()}</span><div class="lc-statement">"${stmt.slice(0,180)}"</div>${acts.slice(0,3).map(a=>{const int=a.intensity||.5;const bc=int>.7?'var(--red)':int>.4?'var(--yellow)':'var(--green)';return`<div class="lc-action"><span class="lc-action-type">${(a.type||'?').toUpperCase()}</span><span class="lc-action-target">${a.target||'?'}</span><div class="lc-bar"><div class="lc-bar-fill" style="width:${int*100}%;background:${bc}"></div></div></div>`}).join('')}`;
      el.appendChild(card);setTimeout(()=>card.classList.add('show'),200*i)});
    setTimeout(()=>{el.classList.remove('active');res()},Math.max(3500,entries.length*250+2500))})},

  /* ── SELECT ── */
  selectCountry(code){
    if(S.sel.includes(code))S.sel=S.sel.filter(c=>c!==code);else{S.sel.push(code);if(S.sel.length>2)S.sel.shift()}
    updateMarkers();
    if(S.sel.length===1)this.showInfo(code);
    else if(S.sel.length===2){this.closeInfo();this.simWar(S.sel[0],S.sel[1])}
  },
  showInfo(code){
    const c=S.countries.find(x=>x.code===code);if(!c)return;
    const sp=Math.round(c.stability*100),mp=Math.round(c.military*100),tp=Math.round(c.techLevel*100);

      <div class="ip-tag">COUNTRY INTELLIGENCE</div>

      <div class="ip-leader">${c.leader}</div>
      ${isW?'<div style="color:var(--red);font-weight:700;margin-bottom:16px;font-size:.9rem">⚠ ACTIVE CONFLICT</div>':''}
      <div class="ip-row"><span class="ip-rl">Composite Power</span><span class="ip-rv" style="color:var(--glow)">${c.power}/100</span></div>
      <div class="ip-row"><span class="ip-rl">GDP</span><span class="ip-rv">$${c.gdp}T</span></div>

      <div class="ip-row"><span class="ip-rl">Stability</span><span class="ip-rv" style="color:${sc}">${sp}%</span></div>

      <div class="ip-row"><span class="ip-rl">Democracy</span><span class="ip-rv">${Math.round(c.democracy*100)}%</span></div>

        <button class="hbtn primary" onclick="G.pickForWar('${c.code}')">SELECT FOR WAR</button>
        <button class="hbtn danger" onclick="G.coup('${c.code}')">FORCE COUP</button>

    document.getElementById('info-panel').classList.add('open');
  },
  closeInfo(){document.getElementById('info-panel').classList.remove('open')},
  pickForWar(code){if(!S.sel.includes(code))S.sel.push(code);if(S.sel.length>2)S.sel.shift();updateMarkers();if(S.sel.length===2){this.closeInfo();this.simWar(S.sel[0],S.sel[1])}else this.tick(`Selected ${code} — click another country`,'medium')},

  /* ── INTEL ── */
  async showIntel(){
    const o=document.getElementById('intel-overlay');document.getElementById('intel-content').innerHTML='<div style="text-align:center;padding:4rem;color:var(--dim)">Loading intelligence...</div>';o.classList.add('active');
    const[sh,pr]=await Promise.all([fetch('/api/shadows').then(r=>r.json()),fetch('/api/predictions?limit=12').then(r=>r.json())]);
    let h=`<div class="isec"><div class="isec-t">ARMS DEALERS</div><div class="igrid">${sh.armsDealers.map(d=>`<div class="icard"><div class="ic-n">${d.name}</div><div class="ic-m">HQ: ${d.hq} | Influence: ${Math.round(d.influence*100)}%</div><div class="ic-s">$${d.revenue}B rev | ${Math.round(d.marketShare*100)}% market</div></div>`).join('')}</div></div>`;
    h+=`<div class="isec"><div class="isec-t">PRIVATE MILITARY</div><div class="igrid">${sh.pmcs.map(p=>`<div class="icard pmc"><div class="ic-n">${p.name}</div><div class="ic-m">Patron: ${p.patron||'Independent'} | XP: ${Math.round(p.combatXP*100)}%</div><div class="ic-s">${p.personnel.toLocaleString()} personnel</div>${p.warCrimes?`<div style="color:var(--red);font-size:.7rem;margin-top:4px">${p.warCrimes} war crime allegations</div>`:''}</div>`).join('')}</div></div>`;
    h+=`<div class="isec"><div class="isec-t">FINANCIAL NETWORKS</div><div class="igrid">${sh.financials.map(f=>`<div class="icard fin"><div class="ic-n">${f.name}</div><div class="ic-m">${f.description.slice(0,90)}</div><div class="ic-s">${f.aum?'$'+f.aum+'B AUM':''}</div></div>`).join('')}</div></div>`;
    h+=`<div class="isec"><div class="isec-t">ENERGY CARTELS</div><div class="igrid">${sh.energyCartels.map(c=>`<div class="icard nrg"><div class="ic-n">${c.name}</div><div class="ic-s">${c.production}M boe/day | Price: ${Math.round(c.priceControl*100)}%</div></div>`).join('')}</div></div>`;
    h+=`<div class="isec"><div class="isec-t">THREAT PREDICTIONS</div><div class="igrid">${pr.map(p=>{const pc=(p.probability*100).toFixed(1);return`<div class="icard pred ${p.probability>.2?'hr':''}"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-family:'Orbitron';font-size:.5rem;letter-spacing:2px;color:var(--glow2)">${p.category.toUpperCase()}</div><div class="ic-n">${p.title}</div><div class="ic-m">${p.description.slice(0,90)}</div></div><div style="text-align:right;min-width:55px"><div style="font-family:'JetBrains Mono';font-size:1.4rem;font-weight:700;color:${pc>20?'var(--red)':pc>10?'var(--yellow)':'var(--green)'}">${pc}%</div></div></div></div>`}).join('')}</div></div>`;
    document.getElementById('intel-content').innerHTML=h;
  },
  closeIntel(){document.getElementById('intel-overlay').classList.remove('active')},

  /* ── CRISIS ── */
  showCrisis(){document.getElementById('crisis-modal').classList.add('active')},
  closeCrisis(){document.getElementById('crisis-modal').classList.remove('active')},
  async injectCrisis(){const ti=document.getElementById('cm-title').value,de=document.getElementById('cm-desc').value,ta=document.getElementById('cm-targets').value;await fetch(`/api/crisis/inject?title=${encodeURIComponent(ti)}&description=${encodeURIComponent(de)}&target_countries=${encodeURIComponent(ta)}`,{method:'POST'});this.closeCrisis();this.shake();this.tick(`CRISIS: ${ti}`,'critical')},

  /* ── RESET ── */
  async resetSim(){await fetch('/api/simulation/start',{method:'POST'});S.decisions={};S.events=[];S.sel=[];S.year=2025;S.turn=0;await this.load();updateMarkers();this.updateHUD();await this.cine('WORLD ORDER','Simulation Reset')},

  /* ── FX ── */
  flash(){const f=document.createElement('div');f.className='war-flash';document.body.appendChild(f);setTimeout(()=>f.remove(),800)},
  shake(){document.body.classList.add('shaking');setTimeout(()=>document.body.classList.remove('shaking'),500)},
};

window.G=G;
G.init();
</script>
</body>
</html>
